<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BFHL Full Stack Challenge</title>

<style>
body{
margin:0;
padding:0;
background:#0a0a0f;
font-family:Arial, sans-serif;
color:white;
display:flex;
justify-content:center;
padding:40px;
}

.container{
width:100%;
max-width:800px;
}

.card{
background:#12121a;
padding:25px;
border-radius:14px;
border:1px solid #1e1e2e;
box-shadow:0 0 20px rgba(0,229,255,0.08);
}

h1{
margin:0;
color:#00e5ff;
}

p{
color:#8892a4;
margin-top:5px;
}

textarea{
width:100%;
height:140px;
margin-top:15px;
background:#0f0f16;
color:white;
border:1px solid #333;
padding:15px;
font-size:16px;
border-radius:10px;
outline:none;
}

textarea:focus{
border-color:#00e5ff;
box-shadow:0 0 10px #00e5ff55;
}

button{
width:100%;
margin-top:15px;
padding:14px;
border:none;
background:#00e5ff;
color:black;
font-weight:bold;
font-size:15px;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 0 20px #00e5ff66;
}

pre{
background:#0f0f16;
padding:20px;
border-radius:12px;
overflow:auto;
margin-top:20px;
white-space:pre-wrap;
}

.stats{
display:flex;
gap:15px;
margin-top:20px;
}

.box{
flex:1;
background:#12121a;
padding:15px;
border-radius:12px;
text-align:center;
border:1px solid #1e1e2e;
}

.num{
color:#00e5ff;
font-size:24px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h1>BFHL Full Stack Challenge</h1>
<p>SRM Engineering Round 1</p>

<textarea id="input"
placeholder="A->B, A->C, B->D, X->Y"></textarea>

<button onclick="submitData()">SUBMIT</button>
</div>

<div id="result" style="display:none;">

<div class="stats">
<div class="box">
Trees
<div class="num" id="trees">0</div>
</div>

<div class="box">
Cycles
<div class="num" id="cycles">0</div>
</div>

<div class="box">
Largest Root
<div class="num" id="largest">-</div>
</div>
</div>

<pre id="json"></pre>

</div>

</div>

<script>
const API_BASE_URL = "http://localhost:3000";

async function submitData(){

const btn = document.querySelector("button");
btn.innerText = "Processing...";
btn.disabled = true;

const raw = document.getElementById("input").value;

const arr = raw.split(",").map(x => x.trim()).filter(x => x);

try{

const res = await fetch(API_BASE_URL + "/bfhl",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
data: arr
})
});

const data = await res.json();

document.getElementById("result").style.display = "block";

document.getElementById("trees").innerText =
data.summary.total_trees;

document.getElementById("cycles").innerText =
data.summary.total_cycles;

document.getElementById("largest").innerText =
data.summary.largest_tree_root;

document.getElementById("json").innerText =
JSON.stringify(data,null,2);

}catch(err){

alert("Error connecting backend");

}

btn.innerText = "SUBMIT";
btn.disabled = false;
}
</script>

</body>
</html>
